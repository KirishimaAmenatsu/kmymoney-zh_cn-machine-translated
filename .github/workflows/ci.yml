name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  ubuntu-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo sed -i -- 's/#[ ]*deb-src/deb-src/g' /etc/apt/apt-mirrors.txt
          sudo apt-get update
          sudo apt-get build-dep -y kmymoney
          sudo apt-get install qt5-default libsqlcipher-dev libqt5sql5-* breeze-icon-theme
          

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo ..

      - name: Build
        run: |
          cd build
          cmake --build . -j4

      - name: Test
        run: |
          cd build
          ctest -VV -j4
